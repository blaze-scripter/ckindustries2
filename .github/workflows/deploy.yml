name: Build and Save Dist to Repo

on:
  push:
    branches:
      - master  # Change to 'master' if your default branch is master

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Double ensures the bot has permission to write files
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🚀 Build Project
      run: npm run build

    - name: 💾 Save Dist folder back to GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: automated build output [skip ci]"
        file_pattern: 'dist/**/*' # Saves everything inside the dist folder
