name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - master  # Change this to 'master' if your default branch is called master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Use Node.js
      uses: actions/setup-node@v4
      with:
        node-with: '20'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🚀 Build Project
      run: npm run build
